<!DOCTYPE html>
<html >
<head>
    <title>bootstrap example</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <h1 class="text-primary text-center">hello bootstrap</h1>
    <div class="container bg-dark text-white p-3">
    Fixed width container
    </div>
    <div class="container-fluid bg-warning p-3">
        Full width container
    </div>
    <div class="container">
    <div class="row">
    <div class="col bg-primary text-white p-3">column 1</div>
    <div class="col bg-success text-white p-3">column 2</div>
    <div class="col bg-danger text-white p-3">column 3</div>
    <div class="col bg-warning text-white p-3">column 4</div>
    <div class="col bg-primary text-white p-3">column5</div>
    <div class="col bg-danger text-white p-3">column6</div>
    <div class="col bg-dark text-white p-3">column7</div>
    <div class="col bg-success text-white p-3">column8</div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
